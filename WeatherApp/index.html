<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherAPP</title>
</head>
<body>
    <link rel="stylesheet" href="styles.css">

    <div class="wrapper">

     <h1>WEATHER APP</h1>

     <div class="tab-container">
        <p class="tab" data-userWeather> Your Weather</p>
        <p class="tab" data-searchWeather> Search Weather</p>
     </div>

     <div class="weather-container">
        
        <!-- grant location container -->
         <div class="sub-container grant-location-container">
          <img src="grantBtn.jpeg" width="80" height="90" loading="lazy">
          <p>Grant Location Access</p>
           <p>Allow Access to get weather Information</p>
          <button class="btn" data-grantAccess>Grant Access</button>
           
         </div>

        <!-- search weather form -->
         <form class="form-container" data-searchForm>
            <input placeholder="Search for city..." data-searchInput>
            <button class="btn" type="submit">
                <img src="searchbtnImg.jpeg" width="15" height="15" loading="lazy">
            </button>
         </form>

          <!-- loading screen --> 
        
      <div class="loading-container">
    <div class="glass-loader">
        <div class="ring"></div>
        <p>Loading...</p>
    </div>
</div>

      

  <!-- show weather info -->

    <div class="sub-container user-info-container">
       
        <!-- city name and flag -->
      <div class="name">
        <p data-cityName></p>
        <img data-countryIcon>
      </div>
      
      <!-- weatherDescriptions -->
      <p data-weatherDesc></p>

      <!-- weather-icon -->

      <img data-weatherIcon>
      
      <p data-temp></p>




      <!-- 3 cards parameters -->
       <div class="parameter-container">

         <!-- 1st card -->
          <div class="parameter">
            <img src="windiconIg.jpeg" width="80" height="80">
            <p>Windspeed</p>
            <p data-windspeed></p>
          </div>

 <!-- 2nd card -->
          <div class="parameter">
            <img src="humnImg.jpeg" width="80" height="80">
            <p>Humidity</p>
            <p data-humidity></p>
          </div>
 <!-- 3rd card -->
         
       <div class="parameter">
            <img src="couldIcon.jpeg" width="80" height="80">
            <p>Clouds</p>
            <p data-cloudiness></p>
          </div>

       </div>


    </div>


     </div>

    </div>





    <script src="index.js"></script>
</body>
</html>
